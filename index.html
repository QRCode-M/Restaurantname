<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
  <title>Menu</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="gallery">
    <button class="menu-thumb" type="button" data-image="./menu-01.jpg" aria-label="فتح صورة المنيو الأولى">
      <img src="./menu-01.jpg" alt="المنيو 1">
    </button>

    <button class="menu-thumb" type="button" data-image="./menu-02.jpg" aria-label="فتح صورة المنيو الثانية">
      <img src="./menu-02.jpg" alt="المنيو 2">
    </button>
  </main>

  <div class="viewer" id="viewer" aria-hidden="true">
    <button class="viewer__backdrop" id="viewer-backdrop" type="button" aria-label="إغلاق"></button>

    <div class="viewer__panel">
      <div class="viewer__toolbar">
        <button class="viewer__btn" id="zoom-in" type="button" aria-label="تكبير">+</button>
        <button class="viewer__btn" id="zoom-out" type="button" aria-label="تصغير">-</button>
        <button class="viewer__btn" id="zoom-reset" type="button" aria-label="إعادة الحجم">100%</button>
        <button class="viewer__btn viewer__btn--close" id="close-viewer" type="button" aria-label="إغلاق">×</button>
      </div>

      <div class="viewer__viewport" id="viewer-viewport">
        <img id="viewer-image" src="" alt="">
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
